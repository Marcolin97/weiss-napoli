services:
  app:
    build: .
    image: prove-copilot:latest
    container_name: prove-copilot
    restart: unless-stopped
    ports:
      - "9999:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=/app/data/app.db
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL:-}
    volumes:
      - app_data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  app_data:
    driver: local
